<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP liste</title>
    <link rel="stylesheet" href="/TP_Liste.css">
</head>
<body>
    <h2>Quelques listes non ordonnées</h2> 
    <p>Voici une liste à puce non ordonnée sans modification (= <em>disc</em>) :</p> 
    <ul> 
        <li>Liste</li> 
        <li>à</li> 
        <li>puces</li> 
    </ul> 
    <p>Avec <em>circle</em> :</p> 
    <ul class="cercle"> 
        <li>Liste</li> 
        <li>à</li> 
        <li>puces</li> 
    </ul> 
    <p>Avec <em>square</em> :</p> 
    <ul class="carre"> 
        <li>Liste</li> 
        <li>à</li> 
        <li>puces</li> 
    </ul> 
    <p>Avec <em>none</em> (sans puces) :</p> 
    <ul class="rien"> 
        <li>Liste</li> 
        <li>à</li> 
        <li>puces</li> 
    </ul>
</body>
</html>
